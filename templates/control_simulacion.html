<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Control de simulación</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="fondo">
  <main class="container mt-5 page-card" role="main">
    <h1 class="text-dark">📱 Control remoto</h1>
    <p class="text-dark">Desde aquí puedes cambiar el estado de la simulación para que se refleje en otra pantalla o dispositivo.</p>

    <form method="post" action="/simulacion/control" class="mt-4">
      <div class="mb-3">
        <label for="estado" class="form-label">Estado</label>
        <select id="estado" name="estado" class="form-select">
          <option value="alerta" {% if estado == 'alerta' %}selected{% endif %}>Alerta</option>
          <option value="normal" {% if estado == 'normal' %}selected{% endif %}>Normal</option>
        </select>
      </div>
      <button type="submit" class="btn btn-info">Actualizar</button>
      <a href="/simulacion" class="btn btn-primary">Volver a la simulación</a>
    </form>
  </main>
</body>
</html>
