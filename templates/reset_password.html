{% extends "base.html" %}
{% block title %}AquaCajay · Restablecer contraseña{% endblock %}
{% block content %}

<section class="auth-section wrap">
  <form class="card form-card auth-card" method="post">
    <span class="eyebrow">Último paso</span>
    <h1>Crea una nueva contraseña</h1>
    <div class="form-row">
      <label for="password">Nueva contraseña</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required>
    </div>
    <div class="form-row">
      <label for="password_confirm">Confirmar contraseña</label>
      <input type="password" id="password_confirm" name="password_confirm" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn btn-clay btn-block">Actualizar contraseña</button>
  </form>
</section>

{% endblock %}
