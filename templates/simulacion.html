<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Simulación</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="fondo">

<div class="container text-center mt-5 page-card">

<main role="main">
	<h1 class="visually-hidden">Simulación</h1>

	<div id="estado" class="alert-banner" role="status" aria-live="polite">
		<div class="alert-inner">
			<div class="alert-left">
				<div class="alert-icon">🚨</div>
			</div>
			<div class="alert-center">
				<div class="alert-title">Se detectó una posible tubería rota.</div>
				<div class="alert-line"><strong>Ubicación:</strong> Sector A</div>
				<div class="alert-line"><strong>Recomendación:</strong> Realizar mantenimiento inmediato.</div>
			</div>
			<div class="alert-right">
				<div class="alert-icon-right">⚠️</div>
			</div>
		</div>
	</div>

</main>

<br><br>

<div class="d-flex justify-content-center gap-4 flex-wrap cta-row">
	<a href="/simulacion/control" class="big-cta cta-remote" role="button">Control remoto <span class="cta-icon">📟</span></a>
	<a href="/menu" class="big-cta cta-back" role="button">← Volver</a>
</div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
<script>
document.addEventListener('DOMContentLoaded', function(){
	const estado = document.getElementById('estado');

	function mostrarAlerta(){
		if(estado){
			estado.className = 'alert-banner';
			estado.innerHTML = `
				<div class="alert-inner">
					<div class="alert-left"><div class="alert-icon">🚨</div></div>
					<div class="alert-center">
						<div class="alert-title">Se detectó una posible tubería rota.</div>
						<div class="alert-line"><strong>Ubicación:</strong> Sector A</div>
						<div class="alert-line"><strong>Recomendación:</strong> Realizar mantenimiento inmediato.</div>
					</div>
					<div class="alert-right"><div class="alert-icon-right">⚠️</div></div>
				</div>
			`;
		}
	}

	function mostrarNormal(){
		if(estado){
			estado.className = 'alert-banner alert-normal';
			estado.innerHTML = '<div class="alert-inner"><div class="alert-center">🟢 El sistema funciona correctamente.</div></div>';
		}
	}

	function actualizarDesdeServidor(){
		fetch('/simulacion/estado')
			.then(response => response.json())
			.then(data => {
				if(data.estado === 'alerta'){
					mostrarAlerta();
				} else {
					mostrarNormal();
				}
			})
			.catch(() => {});
	}

	actualizarDesdeServidor();
	setInterval(actualizarDesdeServidor, 5000);
});
</script>

</body>
</html>
