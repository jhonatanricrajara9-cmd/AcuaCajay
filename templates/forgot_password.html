{% extends "base.html" %}
{% block title %}AquaCajay · Recuperar contraseña{% endblock %}
{% block content %}

<section class="auth-section wrap">
  <form class="card form-card auth-card" method="post">
    <span class="eyebrow">Recuperar acceso</span>
    <h1>¿Olvidaste tu contraseña?</h1>
    <p class="form-hint">Ingresa tu correo y te enviaremos instrucciones para restablecerla.</p>
    <div class="form-row">
      <label for="correo">Correo electrónico</label>
      <input type="email" id="correo" name="correo" placeholder="tucorreo@ejemplo.com" required>
    </div>
    <button type="submit" class="btn btn-clay btn-block">Enviar instrucciones</button>
    <p class="auth-switch"><a href="{{ url_for('login') }}">Volver a ingresar</a></p>
  </form>
</section>

{% endblock %}
