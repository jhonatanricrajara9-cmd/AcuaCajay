<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Contacto</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="fondo">

<main class="container mt-5 page-card" role="main">

		<h1>📞 Contacto</h1>

		<div class="alert alert-info text-start mb-4" role="group" aria-label="Datos de contacto">
			<p class="mb-1"><strong>Nombre:</strong> Jhofreth Ricra Jara</p>
			<p class="mb-0"><strong>Número:</strong> 906568414</p>
		</div>

		<form id="contact-form" method="post" action="/contacto" novalidate>
			<div class="mb-3">
				<label for="name" class="form-label">Nombre</label>
				<input id="name" name="name" type="text" class="form-control" placeholder="Nombre" required aria-required="true">
			</div>

			<div class="mb-3">
				<label for="phone" class="form-label">Número de teléfono</label>
				<input id="phone" name="phone" type="tel" class="form-control" placeholder="Número de teléfono">
			</div>

			<div class="mb-3">
				<label for="message" class="form-label">Mensaje</label>
				<textarea id="message" name="message" class="form-control" rows="4" placeholder="Escribe tu duda" required aria-required="true"></textarea>
			</div>

			<div class="d-flex gap-2">
				<button id="btn-send" type="submit" class="btn btn-info">Enviar</button>
				<a href="/menu" class="btn btn-primary">⬅ Volver</a>
			</div>
		</form>

	</main>

	<script>
		document.addEventListener('DOMContentLoaded', function(){
			const form = document.getElementById('contact-form');
			const btn = document.getElementById('btn-send');
			if(form && btn){
				form.addEventListener('submit', function(e){
					e.preventDefault();
					btn.disabled = true;
					const nombre = document.getElementById('name').value.trim();
					const mensaje = document.getElementById('message').value.trim();
					const texto = encodeURIComponent(`Hola, soy ${nombre || 'un usuario'}. ${mensaje || 'Quiero contactarte.'}`);
					window.open(`https://wa.me/51906568414?text=${texto}`, '_blank', 'noopener,noreferrer');
					setTimeout(()=>{ btn.disabled = false; }, 2000);
				});
			}
		});
	</script>

</body>

</html>
