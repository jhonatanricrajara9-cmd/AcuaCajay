{% extends "base.html" %}
{% block title %}AquaCajay · Ingresar{% endblock %}
{% block content %}

<section class="auth-section wrap">
  <form class="card form-card auth-card" method="post">
    <span class="eyebrow">Bienvenido de nuevo</span>
    <h1>Ingresa a tu cuenta</h1>
    <div class="form-row">
      <label for="correo">Correo electrónico</label>
      <input type="email" id="correo" name="correo" placeholder="tucorreo@ejemplo.com" required>
    </div>
    <div class="form-row">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required>
    </div>
    <div class="auth-links">
      <a href="{{ url_for('forgot_password') }}">¿Olvidaste tu contraseña?</a>
    </div>
    <button type="submit" class="btn btn-clay btn-block">Ingresar</button>
    <p class="auth-switch">¿No tienes cuenta? <a href="{{ url_for('register') }}">Crea una aquí</a></p>
  </form>
</section>

{% endblock %}
