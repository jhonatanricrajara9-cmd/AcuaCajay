{% extends "base.html" %}
{% block title %}AquaCajay · Crear cuenta{% endblock %}
{% block content %}

<section class="auth-section wrap">
  <form class="card form-card auth-card" method="post">
    <span class="eyebrow">Únete a la comunidad</span>
    <h1>Crea tu cuenta</h1>
    <div class="form-row">
      <label for="nombre">Nombre completo</label>
      <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
    </div>
    <div class="form-row">
      <label for="correo">Correo electrónico</label>
      <input type="email" id="correo" name="correo" placeholder="tucorreo@ejemplo.com" required>
    </div>
    <div class="form-row">
      <label for="zona">Zona donde vives</label>
      <select id="zona" name="zona" required>
        <option value="" disabled selected>Selecciona tu zona</option>
        {% for zona in zonas %}
          <option value="{{ zona.nombre }}">{{ zona.nombre }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-row">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn btn-clay btn-block">Crear cuenta</button>
    <p class="auth-switch">¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Ingresa aquí</a></p>
  </form>
</section>

{% endblock %}
